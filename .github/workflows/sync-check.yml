name: sync-check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sync-check-bash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Claude/Copilot agent definitions stay in sync (bash)
        run: ./tools/check-sync.sh

  sync-check-powershell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Claude/Copilot agent definitions stay in sync (PowerShell)
        shell: pwsh
        run: ./tools/check-sync.ps1
